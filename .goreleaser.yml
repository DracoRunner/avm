version: 2

project_name: avm

before:
  hooks:
    - go mod tidy

builds:
  - id: avm
    main: .
    binary: avm
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X avm/cmd.version={{.Version}}

archives:
  - id: avm
    format: tar.gz
    name_template: "avm_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}_snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: DracoRunner
    repo: avm
  footer: |
    **Full Changelog**: https://github.com/DracoRunner/avm/compare/{{ .PreviousTag }}...{{ .Tag }}

# Homebrew tap publishing is disabled for v0.1.0 because it requires a
