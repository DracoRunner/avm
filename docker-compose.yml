services:
  avm-rust-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: build
    container_name: avm-rust-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      CARGO_TERM_COLOR: always
      AVM_PLUGIN_DIR: /workspace/.avm/plugins
    command: ["bash", "-lc", "export PATH=/usr/local/cargo/bin:/workspace/target/debug:$PATH && cd /workspace && cargo test --workspace && cargo build --package avm-cli --bin avm-bin && avm-bin shell-init > /tmp/avm-shell-init.sh && sleep infinity"]
    tty: true
